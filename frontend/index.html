<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Belote en Ligne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-felt:   #1a472a;
      --green-light:  #2d6a4f;
      --green-border: #40916c;
      --gold:         #c9a84c;
      --gold-light:   #e8c96d;
      --cream:        #f5ead5;
      --cream-dark:   #e8d5b0;
      --text-dark:    #1a0a00;
      --red-card:     #c0392b;
      --black-card:   #1a1a2e;
      --shadow:       rgba(0,0,0,0.5);
    }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--green-felt);
      background-image:
        radial-gradient(ellipse at 50% 50%, rgba(64,145,108,0.3) 0%, transparent 70%),
        repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }
    .loading-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-family: 'Cinzel', serif;
      font-size: 1.5rem; color: var(--gold);
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div id="root"><div class="loading-screen">BELOTE</div></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
